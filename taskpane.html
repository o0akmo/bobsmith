<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Excel AI Add-in</title>

    <!-- Office.js -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Fluent UI -->
    <link rel="stylesheet"
          href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <!-- Styles -->
    <link href="./1fda685b81e1123773f6.css" rel="stylesheet"/>

    <!-- Scripts -->
    <script defer src="./polyfill.js"></script>
    <script defer src="./taskpane.js"></script>

    <style>
        #result {
            white-space: pre-wrap;
            padding: 10px;
            margin-top: 12px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            min-height: 100px;
        }

        #run {
            cursor: pointer;
        }
    </style>
</head>

<body class="ms-font-m ms-Fabric">

<header class="ms-welcome__header ms-bgColor-neutralLighter">
    <img width="80" height="80" src="./assets/logo-filled.png" />
    <h1 class="ms-font-su">Excel AI</h1>
</header>

<!-- LOADING STATE -->
<section id="sideload-msg" class="ms-welcome__main">
    <h2 class="ms-font-xl">
        Loading add-in...
    </h2>
</section>

<!-- APP UI -->
<main id="app-body" class="ms-welcome__main" style="display:none">

    <h2 class="ms-font-xl">
        Analyze Excel with AI
    </h2>

    <p class="ms-font-l">
        Select cells → click Run
    </p>

    <div id="run"
         class="ms-Button ms-Button--primary ms-font-l"
         style="padding:10px 20px; margin:10px 0;">
        Run AI
    </div>

    <h3>AI Output</h3>

    <div id="result">Waiting for input...</div>

</main>

</body>
</html>
